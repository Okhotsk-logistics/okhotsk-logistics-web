<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okhotsk Logistics | Yahoo Real-time Search</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .font-noto { font-family: 'Noto Sans JP', sans-serif; }
        .page-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-nav { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .loader { border-top-color: #ef4444; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const YAHOO_CLIENT_ID = "dmVyPTIwMjUwNyZpZD1ta0pXWHNuY2ZpJmhhc2g9WW1JMk0yRTVPV0pqTURaa1lqVXpOUQ"; 
        
        const { useState, useEffect } = React;

        const App = () => {
          const [view, setView] = useState('home'); 
          const [lang, setLang] = useState('ru'); 
          const [scrolled, setScrolled] = useState(false);
          const [query, setQuery] = useState('');
          const [loading, setLoading] = useState(false);
          const [results, setResults] = useState([]);
          const [error, setError] = useState(null);

          const t = {
            ru: {
              home: "Главная", auction: "Аукционы", contact: "Контакты",
              heroTitle: "Японские аукционы онлайн",
              heroSub: "Прямой доступ к Yahoo Auctions через официальный API. Доставка из Токио и Хоккайдо.",
              btnStart: "Начать поиск",
              searchTitle: "Поиск Yahoo! Japan",
              searchPlaceholder: "Например: BBS wheels, Skyline R34...",
              loading: "Ищем в Японии...",
              bid: "Цена:", time: "Осталось:", btnBid: "Посмотреть лот",
              footer: "Okhotsk Logistics 株式会社 — Официальный экспортёр."
            },
            en: {
              home: "Home", auction: "Auctions", contact: "Contact",
              heroTitle: "Japan Auctions Online",
              heroSub: "Direct access to Yahoo Auctions via official API. Shipping from Tokyo & Hokkaido.",
              btnStart: "Start Search",
              searchTitle: "Yahoo! Japan Search",
              searchPlaceholder: "Example: BBS wheels, Skyline R34...",
              loading: "Searching in Japan...",
              bid: "Price:", time: "Left:", btnBid: "View Lot",
              footer: "Okhotsk Logistics Co., Ltd. — Official Exporter."
            },
            ja: {
              home: "ホーム", auction: "ヤフオク!", contact: "お問い合わせ",
              heroTitle: "ヤフオク! リアルタイム検索",
              heroSub: "公式APIを使用して、最高のパーツや機械を見つけます。",
              btnStart: "検索を開始",
              searchTitle: "ヤフオク! 公式検索",
              searchPlaceholder: "検索キーワード (例: R34, BBS...)",
              loading: "Yahooサーバーに接続中...",
              bid: "現在価格:", time: "残り時間:", btnBid: "詳細を見る",
              footer: "Okhotsk Logistics 株式会社 — 日本からの輸出業者。"
            }
          }[lang];

          const handleSearch = async (e) => {
            if (e) e.preventDefault();
            if (!query.trim()) return;
            
            setLoading(true);
            setError(null);
            
            try {
              // Новый «мостик», который не требует нажатия кнопок!
              const apiUrl = `https://auctions.yahooapis.jp/AuctionWebService/V2/search?appid=${YAHOO_CLIENT_ID}&query=${encodeURIComponent(query)}&output=json`;
              const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(apiUrl)}`;

              const response = await fetch(proxyUrl);
              const data = await response.json();
              
              const items = data?.ResultSet?.Result?.Item || [];
              const formattedResults = items.map(item => ({
                title: item.Title,
                price: item.CurrentPrice + " ¥",
                time: item.RemainingTime || "N/A",
                img: item.Image || "https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?q=80&w=800",
                url: item.AuctionItemUrl
              }));

              setResults(formattedResults);
              if (formattedResults.length === 0) setError("Ничего не найдено. Попробуйте другой запрос.");
            } catch (err) {
              setError("Ошибка связи с Yahoo. Проверьте Client ID.");
              console.error(err);
            } finally {
              setLoading(false);
            }
          };

          useEffect(() => {
            const handleScroll = () => setScrolled(window.scrollY > 40);
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

          return (
            <div className={`min-h-screen ${lang === 'ja' ? 'font-noto' : ''}`}>
              <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled || view !== 'home' ? 'glass-nav shadow-md py-4' : 'bg-transparent py-6 text-white'}`}>
                <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                  <div className="flex items-center gap-3 cursor-pointer" onClick={() => setView('home')}>
                    <div className="bg-red-600 text-white w-10 h-10 flex items-center justify-center rounded-xl rotate-3 shadow-lg"><i className="fa-solid fa-ship"></i></div>
                    <span className={`text-xl font-black uppercase tracking-tighter ${scrolled || view !== 'home' ? 'text-slate-900' : 'text-white'}`}>OKHOTSK <span className="text-red-600">LOGISTICS</span></span>
                  </div>
                  
                  <div className="hidden md:flex gap-8 font-bold">
                    <button onClick={() => setView('home')} className="hover:text-red-600 transition-colors">{t.home}</button>
                    <button onClick={() => setView('auction')} className="hover:text-red-600 transition-colors">{t.auction}</button>
                    <button onClick={() => setView('contact')} className="hover:text-red-600 transition-colors">{t.contact}</button>
                  </div>

                  <select onChange={(e) => setLang(e.target.value)} value={lang} className="bg-slate-200 text-slate-900 rounded-lg px-2 py-1 text-xs font-bold outline-none cursor-pointer">
                    <option value="ru">RU</option><option value="en">EN</option><option value="ja">JP</option>
                  </select>
                </div>
              </nav>

              <main>
                {view === 'home' && (
                  <div className="page-fade">
                    <section className="pt-48 pb-32 bg-slate-900 text-white text-center px-6 min-h-screen flex items-center justify-center relative overflow-hidden">
                      <div className="absolute inset-0 opacity-20 pointer-events-none">
                        <div className="absolute -top-40 -right-40 w-[600px] h-[600px] bg-red-600 rounded-full blur-[150px]"></div>
                      </div>
                      <div className="relative z-10">
                        <h1 className="text-5xl md:text-8xl font-black mb-6 italic tracking-tight uppercase">OKHOTSK <span className="text-red-600 text-shadow">LOGISTICS</span></h1>
                        <p className="text-2xl md:text-4xl font-bold mb-8">{t.heroTitle}</p>
                        <p className="max-w-2xl mx-auto text-slate-400 text-lg mb-12 italic">{t.heroSub}</p>
                        <button onClick={() => setView('auction')} className="bg-red-600 hover:bg-red-700 px-12 py-6 rounded-full font-black text-2xl transition-all shadow-xl shadow-red-600/30">{t.btnStart}</button>
                      </div>
                    </section>
                  </div>
                )}

                {view === 'auction' && (
                  <div className="page-fade pt-32 pb-20 max-w-7xl mx-auto px-6">
                    <div className="mb-12 flex flex-col md:flex-row justify-between items-end gap-6">
                      <div className="max-w-xl">
                        <h2 className="text-4xl font-black mb-4 flex items-center gap-3"><i className="fa-solid fa-search text-red-600"></i> {t.searchTitle}</h2>
                      </div>
                      <form onSubmit={handleSearch} className="w-full md:w-auto flex-grow max-w-md relative">
                        <input 
                          type="text" 
                          value={query}
                          onChange={(e) => setQuery(e.target.value)}
                          placeholder={t.searchPlaceholder}
                          className="w-full pl-6 pr-16 py-4 rounded-full border border-slate-300 focus:ring-2 focus:ring-red-600 outline-none shadow-md"
                        />
                        <button disabled={loading} className="absolute right-2 top-2 bg-slate-900 text-white p-3 rounded-full hover:bg-red-600 transition-colors">
                          {loading ? <div className="w-5 h-5 border-2 loader rounded-full"></div> : <i className="fa-solid fa-magnifying-glass"></i>}
                        </button>
                      </form>
                    </div>

                    {error && <div className="bg-red-50 text-red-600 p-6 rounded-3xl mb-12 font-bold flex items-center gap-3 italic"><i className="fa-solid fa-triangle-exclamation"></i> {error}</div>}

                    {loading ? (
                      <div className="flex flex-col items-center justify-center py-20 space-y-4">
                        <div className="w-12 h-12 border-4 loader rounded-full"></div>
                        <p className="font-bold text-slate-500">{t.loading}</p>
                      </div>
                    ) : results.length > 0 ? (
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                        {results.map((res, idx) => (
                          <div key={idx} className="bg-white rounded-3xl border border-slate-200 overflow-hidden hover:shadow-2xl transition-all group page-fade">
                            <div className="h-56 overflow-hidden relative bg-slate-100">
                              <img src={res.img} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt="lot" />
                            </div>
                            <div className="p-5">
                              <h3 className="font-bold text-sm mb-4 h-10 overflow-hidden leading-tight text-slate-800">{res.title}</h3>
                              <div className="flex justify-between border-t border-slate-100 pt-3 mb-4">
                                <div><p className="text-slate-400 text-[10px] uppercase font-bold">{t.bid}</p><p className="text-lg font-black text-slate-900">{res.price}</p></div>
                                <div className="text-right"><p className="text-slate-400 text-[10px] uppercase font-bold">{t.time}</p><p className="text-red-600 font-bold text-xs">{res.time}</p></div>
                              </div>
                              <a href={res.url} target="_blank" className="block text-center w-full bg-slate-100 text-slate-900 py-3 rounded-xl font-bold hover:bg-red-600 hover:text-white transition-all">
                                {t.btnBid}
                              </a>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="text-center py-32 bg-white rounded-3xl border border-dashed border-slate-300">
                        <i className="fa-solid fa-boxes-stacked text-6xl text-slate-100 mb-6"></i>
                        <p className="text-xl text-slate-300 font-medium italic">Введите запрос для поиска по реальной базе Yahoo Japan</p>
                      </div>
                    )}
                  </div>
                )}

                {view === 'contact' && (
                  <div className="page-fade pt-32 pb-20 max-w-5xl mx-auto px-6">
                    <h2 className="text-4xl font-black mb-12 text-center uppercase tracking-widest italic">Контакты</h2>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 text-center">
                      <div className="bg-white p-10 rounded-3xl border shadow-sm flex flex-col items-center">
                        <i className="fa-solid fa-map-pin text-red-600 text-3xl mb-4"></i>
                        <h4 className="font-bold text-lg mb-2">Токио</h4>
                        <p className="text-slate-500 text-sm">1-2-1 Ojima, Koto City</p>
                      </div>
                      <div className="bg-white p-10 rounded-3xl border shadow-sm flex flex-col items-center">
                        <i className="fa-solid fa-phone text-red-600 text-3xl mb-4"></i>
                        <h4 className="font-bold text-lg mb-2">Телефон</h4>
                        <p className="text-slate-500 text-sm">080-5134-9760</p>
                      </div>
                      <div className="bg-white p-10 rounded-3xl border shadow-sm flex flex-col items-center">
                        <i className="fa-solid fa-envelope text-red-600 text-3xl mb-4"></i>
                        <h4 className="font-bold text-lg mb-2">Email</h4>
                        <p className="text-slate-500 text-sm italic underline">okhotsklogistics@gmail.com</p>
                      </div>
                    </div>
                  </div>
                )}
              </main>

              <footer className="bg-slate-900 text-slate-500 py-12 px-6 border-t border-slate-800 mt-20 text-center">
                <span className="text-white font-black uppercase text-lg italic tracking-widest">Okhotsk Logistics 株式会社</span>
                <p className="text-[10px] mt-2 opacity-50 uppercase tracking-widest leading-loose">Hokkaido • Engaru • Tokyo • Global Export</p>
              </footer>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
