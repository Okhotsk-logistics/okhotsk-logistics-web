<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okhotsk Logistics | Japan Export Official</title>
    
    <!-- Подключаем всё для красоты -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@900&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; margin: 0; }
        .font-jp { font-family: 'Noto Sans JP', sans-serif; }
        
        .hero-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?q=80&w=2000');
            background-size: cover;
            background-position: center;
        }

        .about-bg {
            background: linear-gradient(rgba(15, 23, 42, 0.8), rgba(15, 23, 42, 0.8)), 
                        url('https://images.unsplash.com/photo-1516383740770-fbcc5cbece03?q=80&w=2000');
            background-size: cover;
            background-position: center;
        }

        .nav-link {
            position: relative;
            transition: all 0.3s ease;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 3px;
            background: #ef4444;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after { width: 100%; }
        
        .card-blur {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .animate-fade { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
          const [view, setView] = useState('home');
          const [scrolled, setScrolled] = useState(false);

          useEffect(() => {
            const handleScroll = () => setScrolled(window.scrollY > 50);
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

          const Nav = () => (
            <nav className={`fixed w-full z-50 transition-all duration-500 ${scrolled ? 'bg-slate-900/95 py-4 shadow-2xl backdrop-blur-md' : 'bg-transparent py-8'}`}>
              <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                <div className="flex items-center gap-4 cursor-pointer" onClick={() => setView('home')}>
                  <div className="bg-red-600 text-white w-12 h-12 flex items-center justify-center rounded-2xl shadow-lg shadow-red-600/30 transform -rotate-3">
                    <i className="fa-solid fa-ship text-2xl"></i>
                  </div>
                  <div className="leading-none">
                    <span className="text-2xl font-black italic tracking-tighter block uppercase">OKHOTSK</span>
                    <span className="text-red-600 text-sm font-bold tracking-[0.3em] uppercase">LOGISTICS</span>
                  </div>
                </div>

                <div className="hidden md:flex gap-12">
                  <button onClick={() => setView('home')} className={`nav-link text-lg font-black uppercase tracking-widest italic ${view === 'home' ? 'text-red-600' : 'text-white'}`}>Главная</button>
                  <button onClick={() => setView('about')} className={`nav-link text-lg font-black uppercase tracking-widest italic ${view === 'about' ? 'text-red-600' : 'text-white'}`}>О компании</button>
                  <button onClick={() => setView('contact')} className={`nav-link text-lg font-black uppercase tracking-widest italic ${view === 'contact' ? 'text-red-600' : 'text-white'}`}>Контакты</button>
                </div>

                <div className="flex gap-4">
                  <a href="https://wa.me/818051349760" target="_blank" className="bg-green-600 hover:bg-green-700 w-12 h-12 flex items-center justify-center rounded-full transition-all shadow-lg">
                    <i className="fa-brands fa-whatsapp text-2xl"></i>
                  </a>
                </div>
              </div>
            </nav>
          );

          return (
            <div className="min-h-screen">
              <Nav />

              <main>
                {view === 'home' && (
                  <section className="hero-bg min-h-screen flex items-center justify-center px-6 pt-20 relative overflow-hidden">
                    <div className="absolute top-0 left-0 w-full h-full bg-slate-950/20 z-0"></div>
                    <div className="relative z-10 text-center animate-fade">
                      <h2 className="text-red-600 font-black text-2xl md:text-3xl mb-4 italic tracking-[0.3em] uppercase">Hokkaido • Tokyo • Global</h2>
                      <h1 className="text-7xl md:text-[10rem] font-black italic tracking-tighter leading-none mb-10 uppercase">
                        EXPRESS <span className="text-red-600">JAPAN</span>
                      </h1>
                      <p className="text-xl md:text-3xl font-light italic opacity-80 uppercase tracking-widest max-w-4xl mx-auto mb-16 leading-relaxed">
                        Официальный экспорт автомобилей, запчастей и спецтехники напрямую из Японии.
                      </p>
                      <div className="flex flex-col md:flex-row gap-8 justify-center">
                        <button onClick={() => setView('about')} className="bg-white text-slate-950 px-12 py-6 rounded-full font-black text-xl uppercase italic tracking-tighter hover:bg-red-600 hover:text-white transition-all shadow-2xl">
                          Узнать больше
                        </button>
                        <button onClick={() => setView('contact')} className="border-2 border-white/30 backdrop-blur-md px-12 py-6 rounded-full font-black text-xl uppercase italic tracking-tighter hover:bg-white hover:text-slate-950 transition-all">
                          Связаться с нами
                        </button>
                      </div>
                    </div>
                  </section>
                )}

                {view === 'about' && (
                  <section className="animate-fade">
                    <div className="about-bg py-48 px-6 text-center">
                      <h2 className="text-6xl md:text-8xl font-black italic uppercase tracking-tighter mb-8 underline decoration-red-600 decoration-8 underline-offset-8">О компании</h2>
                      <p className="max-w-3xl mx-auto text-2xl font-light italic leading-relaxed opacity-90">
                        Okhotsk Logistics 株式会社 — это ваш надежный мост между японскими аукционами и мировым рынком. Мы базируемся в Токио и на Хоккайдо, обеспечивая полный цикл логистики.
                      </p>
                    </div>

                    <div className="max-w-7xl mx-auto px-6 -mt-24 pb-32">
                      <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                        <div className="card-blur p-12 rounded-[40px] shadow-2xl group hover:border-red-600 transition-all">
                          <i className="fa-solid fa-gem text-5xl text-red-600 mb-8"></i>
                          <h3 className="text-3xl font-black italic mb-6 uppercase tracking-tight">Качество JDM</h3>
                          <p className="text-slate-400 leading-relaxed font-medium">Только проверенные лоты с аукционов Yahoo, USS, TAA. Мы знаем, как отличить настоящий раритет от хлама.</p>
                        </div>
                        <div className="card-blur p-12 rounded-[40px] shadow-2xl group hover:border-red-600 transition-all">
                          <i className="fa-solid fa-anchor text-5xl text-red-600 mb-8"></i>
                          <h3 className="text-3xl font-black italic mb-6 uppercase tracking-tight">Логистика</h3>
                          <p className="text-slate-400 leading-relaxed font-medium">Собственные площадки для хранения и погрузки. Отправка контейнеров и Ro-Ro из крупнейших портов Японии.</p>
                        </div>
                        <div className="card-blur p-12 rounded-[40px] shadow-2xl group hover:border-red-600 transition-all">
                          <i className="fa-solid fa-handshake text-5xl text-red-600 mb-8"></i>
                          <h3 className="text-3xl font-black italic mb-6 uppercase tracking-tight">Честность</h3>
                          <p className="text-slate-400 leading-relaxed font-medium">Прозрачные инвойсы, официальные договора и полная фото-опись вашего груза на каждом этапе.</p>
                        </div>
                      </div>
                    </div>
                  </section>
                )}

                {view === 'contact' && (
                  <section className="animate-fade pt-48 pb-32 px-6 max-w-7xl mx-auto">
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-20">
                      <div>
                        <h2 className="text-7xl font-black italic uppercase tracking-tighter mb-10 leading-none">БУДЕМ <span className="text-red-600">НА СВЯЗИ</span></h2>
                        <p className="text-2xl text-slate-400 font-light italic mb-12">Мы всегда на связи в рабочее время по Токио. Пишите в мессенджеры или на почту.</p>
                        
                        <div className="space-y-10">
                          <div className="flex gap-8 items-center">
                            <div className="w-20 h-20 bg-slate-800 rounded-3xl flex items-center justify-center text-3xl text-red-600 shadow-xl border border-white/5"><i className="fa-solid fa-phone"></i></div>
                            <div>
                              <p className="text-slate-500 font-bold uppercase text-xs tracking-widest mb-1">Телефон в Японии</p>
                              <p className="text-3xl font-black italic tracking-tight">080-5134-9760</p>
                            </div>
                          </div>
                          <div className="flex gap-8 items-center">
                            <div className="w-20 h-20 bg-slate-800 rounded-3xl flex items-center justify-center text-3xl text-red-600 shadow-xl border border-white/5"><i className="fa-solid fa-envelope"></i></div>
                            <div>
                              <p className="text-slate-500 font-bold uppercase text-xs tracking-widest mb-1">Email</p>
                              <p className="text-2xl font-black italic tracking-tight underline decoration-red-600 underline-offset-4">okhotsklogistics@gmail.com</p>
                            </div>
                          </div>
                          <div className="flex gap-8 items-center">
                            <div className="w-20 h-20 bg-slate-800 rounded-3xl flex items-center justify-center text-3xl text-red-600 shadow-xl border border-white/5"><i className="fa-solid fa-location-dot"></i></div>
                            <div>
                              <p className="text-slate-500 font-bold uppercase text-xs tracking-widest mb-1">Главный офис</p>
                              <p className="text-2xl font-black italic tracking-tight uppercase">Tokyo, Koto City, Ojima 1-2-1</p>
                            </div>
                          </div>
                        </div>
                      </div>

                      <div className="card-blur p-12 rounded-[50px] shadow-2xl relative overflow-hidden">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-red-600/10 rounded-full -mr-16 -mt-16 blur-3xl"></div>
                        <h3 className="text-3xl font-black italic mb-10 uppercase tracking-tighter">Оставить запрос</h3>
                        <div className="space-y-6">
                          <div>
                            <label className="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 italic">Ваше имя</label>
                            <input type="text" className="w-full bg-slate-900/50 border border-white/10 p-5 rounded-2xl outline-none focus:border-red-600 transition-all font-bold" placeholder="Михаил" />
                          </div>
                          <div>
                            <label className="block text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 italic">Сообщение</label>
                            <textarea className="w-full bg-slate-900/50 border border-white/10 p-5 rounded-2xl outline-none focus:border-red-600 transition-all font-bold h-40" placeholder="Интересует экспорт спецтехники с Хоккайдо..."></textarea>
                          </div>
                          <button className="w-full bg-red-600 py-6 rounded-2xl font-black text-xl uppercase italic tracking-tighter hover:bg-red-700 transition-all shadow-xl shadow-red-600/30">Отправить</button>
                        </div>
                      </div>
                    </div>
                  </section>
                )}
              </main>

              <footer className="bg-slate-950 py-24 px-6 border-t border-white/5 text-center">
                <div className="max-w-7xl mx-auto">
                  <span className="text-5xl font-black italic uppercase tracking-tighter block mb-4">OKHOTSK <span className="text-red-600">LOGISTICS</span></span>
                  <p className="text-[10px] text-slate-500 font-bold uppercase tracking-[0.6em] mb-12 italic">Официальный сервис экспорта из Японии • Основано в 2024</p>
                  <div className="flex justify-center gap-12 text-3xl text-white/20 mb-12">
                    <i className="fa-brands fa-whatsapp hover:text-green-500 transition-colors cursor-pointer"></i>
                    <i className="fa-brands fa-telegram hover:text-blue-400 transition-colors cursor-pointer"></i>
                    <i className="fa-brands fa-instagram hover:text-pink-500 transition-colors cursor-pointer"></i>
                  </div>
                  <p className="text-[10px] font-black text-slate-700 uppercase tracking-widest">© 2026 Okhotsk Logistics Co., Ltd. • All Rights Reserved</p>
                </div>
              </footer>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
