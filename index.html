<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okhotsk Logistics | Yahoo Japan Auctions</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        .font-noto { font-family: 'Noto Sans JP', sans-serif; }
        .page-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border-top-color: #ef4444; animation: spinner 1s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">

        const YAHOO_CLIENT_ID = "dmVyPTIwMjUwNyZpZD1ta0pXWHNuY2ZpJmhhc2g9WW1JMk0yRTVPV0pqTURaa1lqVXpOUQ"; 

        const { useState, useEffect } = React;

        const App = () => {
          const [view, setView] = useState('home'); 
          const [lang, setLang] = useState('ru'); 
          const [scrolled, setScrolled] = useState(false);
          const [query, setQuery] = useState('');
          const [loading, setLoading] = useState(false);
          const [results, setResults] = useState([]);
          const [error, setError] = useState(null);

          const t = {
            ru: {
              home: "Главная", auction: "Аукционы", contact: "Контакты",
              title: "Поиск по лотам Yahoo! Japan",
              sub: "Прямое подключение к аукционам через официальный API.",
              placeholder: "Поиск (напр: BBS, R34, TE37...)",
              nothing: "Ничего не найдено. Проверьте запрос или ID.",
              bid: "Цена:", time: "Осталось:", btn: "Детали"
            },
            ja: {
              home: "ホーム", auction: "ヤフオク!", contact: "お問い合わせ",
              title: "ヤフオク! リアルタイム検索",
              sub: "公式APIを使用して直接検索します。",
              placeholder: "検索キーワード (例: BBS, R34...)",
              nothing: "商品が見つかりませんでした。",
              bid: "現在価格:", time: "残り時間:", btn: "詳細"
            }
          }[lang === 'ru' ? 'ru' : 'ja'];

          const handleSearch = async (e) => {
            if (e) e.preventDefault();
            if (!query.trim()) return;
            
            setLoading(true);
            setError(null);
            setResults([]);

            try {
              // Миша, используем надежный прокси, чтобы Yahoo нас не блокировал
              const targetUrl = `https://auctions.yahooapis.jp/AuctionWebService/V2/search?appid=${YAHOO_CLIENT_ID}&query=${encodeURIComponent(query)}&output=json`;
              const finalUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
              
              const response = await fetch(finalUrl);
              const data = await response.json();
              
              // Yahoo API возвращает данные в поле contents в виде строки
              const yahooJson = JSON.parse(data.contents);
              
              const items = yahooJson?.ResultSet?.Result?.Item || [];
              
              if (items.length === 0) {
                setError(t.nothing);
              } else {
                setResults(items.map(item => ({
                  title: item.Title,
                  price: item.CurrentPrice + " ¥",
                  time: item.RemainingTime || "Live",
                  img: item.Image || "https://images.unsplash.com/photo-1541899481282-d53bffe3c35d?q=80&w=800",
                  url: item.AuctionItemUrl
                })));
              }
            } catch (err) {
              setError("Ошибка подключения к Yahoo. Проверьте Client ID или попробуйте позже.");
              console.error(err);
            } finally {
              setLoading(false);
            }
          };

          useEffect(() => {
            const handleScroll = () => setScrolled(window.scrollY > 40);
            window.addEventListener('scroll', handleScroll);
            return () => window.removeEventListener('scroll', handleScroll);
          }, []);

          return (
            <div className={`min-h-screen ${lang === 'ja' ? 'font-noto' : ''}`}>
              <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled || view !== 'home' ? 'bg-white shadow-md py-4 text-slate-900' : 'bg-transparent py-6 text-white'}`}>
                <div className="max-w-7xl mx-auto px-6 flex justify-between items-center">
                  <div className="flex items-center gap-2 cursor-pointer" onClick={() => setView('home')}>
                    <div className="bg-red-600 text-white p-2 rounded-lg font-black tracking-tighter shadow-lg">OL</div>
                    <span className="text-xl font-black uppercase tracking-tighter italic">Okhotsk <span className="text-red-600 font-black">Logistics</span></span>
                  </div>
                  <div className="hidden md:flex gap-8 font-bold text-sm uppercase tracking-widest">
                    <button onClick={() => setView('home')} className="hover:text-red-600 transition-colors">Главная</button>
                    <button onClick={() => setView('auction')} className="hover:text-red-600 transition-colors font-black text-red-600">Аукционы</button>
                    <button onClick={() => setView('contact')} className="hover:text-red-600 transition-colors">Контакты</button>
                  </div>
                  <button onClick={() => setLang(lang === 'ru' ? 'ja' : 'ru')} className="bg-slate-200 text-slate-900 px-3 py-1 rounded text-xs font-black">
                    {lang.toUpperCase()}
                  </button>
                </div>
              </nav>

              <main>
                {view === 'home' ? (
                  <section className="page-fade pt-48 pb-32 bg-slate-900 text-white text-center px-6 min-h-screen flex flex-col justify-center items-center relative overflow-hidden">
                    <div className="absolute inset-0 opacity-10"><div className="absolute -top-40 -right-40 w-[600px] h-[600px] bg-red-600 rounded-full blur-[150px]"></div></div>
                    <h1 className="text-6xl md:text-9xl font-black italic tracking-tighter mb-8 uppercase">Direct <span className="text-red-600">Yahoo</span> Access</h1>
                    <p className="text-xl md:text-2xl text-slate-400 max-w-2xl font-light italic mb-12">Поиск по реальной базе Yahoo Japan через официальный шлюз.</p>
                    <button onClick={() => setView('auction')} className="bg-red-600 hover:bg-red-700 px-12 py-5 rounded-full font-black text-xl shadow-xl shadow-red-600/20 transition-all uppercase tracking-widest">Открыть поиск</button>
                  </section>
                ) : view === 'auction' ? (
                  <div className="page-fade pt-32 pb-20 max-w-7xl mx-auto px-6">
                    <div className="mb-12 flex flex-col md:flex-row justify-between items-end gap-6">
                      <div className="max-w-xl">
                        <h2 className="text-4xl font-black mb-2 flex items-center gap-3 italic tracking-tight"><i className="fa-solid fa-bolt text-red-600"></i> {t.title}</h2>
                        <p className="text-slate-400 text-sm italic">{t.sub}</p>
                      </div>
                      <form onSubmit={handleSearch} className="w-full md:w-auto flex-grow max-w-md relative">
                        <input 
                          type="text" 
                          value={query}
                          onChange={(e) => setQuery(e.target.value)}
                          placeholder={t.placeholder}
                          className="w-full pl-6 pr-16 py-4 rounded-2xl border border-slate-200 focus:ring-4 focus:ring-red-600/10 outline-none shadow-xl font-bold italic"
                        />
                        <button disabled={loading} className="absolute right-2 top-2 bg-slate-900 text-white p-3 rounded-xl hover:bg-red-600 transition-colors shadow-lg">
                          {loading ? <div className="w-5 h-5 border-2 loader rounded-full"></div> : <i className="fa-solid fa-search"></i>}
                        </button>
                      </form>
                    </div>

                    {error && <div className="bg-red-50 text-red-600 p-6 rounded-2xl mb-8 font-black italic flex items-center gap-4 shadow-inner"><i className="fa-solid fa-circle-exclamation text-xl"></i> {error}</div>}

                    {loading ? (
                      <div className="flex flex-col items-center justify-center py-40 space-y-6">
                        <div className="w-16 h-16 border-4 loader rounded-full shadow-2xl"></div>
                        <p className="font-black text-slate-300 uppercase tracking-[0.3em] animate-pulse">Searching Japan...</p>
                      </div>
                    ) : results.length > 0 ? (
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                        {results.map((res, idx) => (
                          <div key={idx} className="bg-white rounded-3xl border border-slate-100 overflow-hidden hover:shadow-2xl transition-all group page-fade">
                            <div className="h-56 overflow-hidden relative bg-slate-50">
                              <img src={res.img} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" alt="lot" />
                              <div className="absolute top-4 left-4 bg-slate-900/80 backdrop-blur text-white text-[10px] font-black px-3 py-1 rounded-full uppercase tracking-widest">LIVE</div>
                            </div>
                            <div className="p-5">
                              <h3 className="font-bold text-xs mb-4 h-8 overflow-hidden leading-tight text-slate-800 italic uppercase tracking-tighter">{res.title}</h3>
                              <div className="flex justify-between border-t border-slate-50 pt-3 mb-4 font-black">
                                <div><p className="text-slate-400 text-[10px] uppercase">{t.bid}</p><p className="text-lg text-slate-900 tracking-tighter">{res.price}</p></div>
                                <div className="text-right"><p className="text-slate-400 text-[10px] uppercase">{t.time}</p><p className="text-red-600 text-xs">{res.time}</p></div>
                              </div>
                              <a href={res.url} target="_blank" className="block text-center w-full bg-slate-50 text-slate-900 py-4 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] hover:bg-red-600 hover:text-white transition-all shadow-inner">
                                {t.btn}
                              </a>
                            </div>
                          </div>
                        ))}
                      </div>
                    ) : (
                      <div className="text-center py-40 bg-white rounded-[40px] border-2 border-dashed border-slate-100 shadow-inner">
                        <i className="fa-solid fa-magnifying-glass text-6xl text-slate-100 mb-6"></i>
                        <p className="text-xl text-slate-300 font-black italic uppercase tracking-tighter">Введите запрос для поиска по реальной базе Yahoo Japan</p>
                      </div>
                    )}
                  </div>
                ) : (
                  <div className="page-fade pt-48 pb-20 max-w-5xl mx-auto px-6 text-center">
                    <h2 className="text-5xl font-black mb-12 italic uppercase tracking-tighter">Контакты</h2>
                    <div className="bg-white p-12 rounded-[40px] shadow-2xl border border-slate-100 inline-block">
                        <p className="text-2xl font-black text-slate-900 italic mb-2 tracking-tighter">Okhotsk Logistics 株式会社</p>
                        <p className="text-slate-500 font-bold mb-8 uppercase tracking-widest">Tokyo • Hokkaido • Export Service</p>
                        <div className="space-y-4 text-left border-t pt-8">
                            <p className="flex items-center gap-4 font-bold italic"><i className="fa-solid fa-phone text-red-600"></i> 080-5134-9760</p>
                            <p className="flex items-center gap-4 font-bold italic"><i className="fa-solid fa-envelope text-red-600"></i> okhotsklogistics@gmail.com</p>
                        </div>
                    </div>
                  </div>
                )}
              </main>

              <footer className="bg-slate-900 text-slate-500 py-16 px-6 border-t border-slate-800 mt-20 text-center">
                <span className="text-white font-black uppercase text-2xl italic tracking-tighter">Okhotsk <span className="text-red-600">Logistics</span></span>
                <p className="text-[10px] mt-4 opacity-40 uppercase tracking-[0.4em] font-black">Official Yahoo Auction Service Provider</p>
              </footer>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
